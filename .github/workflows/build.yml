name: frida-arm64-终极隐藏版

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK r25b
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-multilib flex bison ruby ruby-dev
          sudo gem install fpm -v 1.11.0
          python3 -m pip install lief graphlib

      - name: Clone Frida 16.5.6
        run: |
          git clone --recurse-submodules --branch 16.5.6 https://github.com/frida/frida

      - name: 二次魔改-终极去特征（无任何sed报错版）
        run: |
          cd frida

          # 只替换核心源码里含特征的文件，绝不碰目录/测试文件
          for f in $(grep -rl "27042\|frida\|gum" subprojects/frida-core subprojects/frida-gum --include="*.c" --include="*.h"); do
            sed -i 's/27042/51234/g' "$f"
            sed -i 's/frida-server/sys_service/g' "$f"
            sed -i 's/"frida"/"android_sys"/g' "$f"
            sed -i 's/frida_/sys_/g' "$f"
            sed -i 's/gum-/sys_core-/g' "$f"
            sed -i 's/gum_/sys_core_/g' "$f"
            sed -i 's/"gum-js-loop"/"sys_worker"/g' "$f"
            sed -i 's/"frida-thread"/"core_thread"/g' "$f"
            sed -i 's/"gmain"/"system_main"/g' "$f"
            sed -i 's/"frida-agent"/"libandroid_kit"/g' "$f"
            sed -i 's/"frida-jit"/"libsystem_jit"/g' "$f"
          done

      - name: Build arm64
        run: |
          export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
          mkdir build-android-arm64
          cd build-android-arm64
          ../frida/configure --host=android-arm64
          make -j$(nproc)
          cd ..
          gzip build-android-arm64/subprojects/frida-core/server/frida-server

      - name: Upload to artifact
        uses: actions/upload-artifact@v4
        with:
          name: frida-arm64-终极隐藏版
          path: build-android-arm64/subprojects/frida-core/server/frida-server.gz

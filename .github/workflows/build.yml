name: Build StrongR-Frida

on: [push, pull_request]

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 python3-pip ninja-build meson llvm lld unzip wget
          pip3 install --upgrade pip setuptools wheel

      # ✅ 安装 Android NDK（关键）
      - name: Install Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_ROOT=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Clone Frida
        run: |
          git clone --recursive https://github.com/frida/frida.git
          cd frida
          git checkout 16.5.6

      # ✅ 安全隐藏 Patch（不会破协议）
      - name: Apply StrongR Patches
        run: |
          cd frida

          # ===== 线程名隐藏 =====
          find subprojects/frida-gum -name "*.c" -exec sed -i 's/gum-js-loop/worker/g' {} \;
          find subprojects/frida-gum -name "*.c" -exec sed -i 's/gmain/system/g' {} \;
          find subprojects/frida-gum -name "*.c" -exec sed -i 's/gdbus/service/g' {} \;

          # ===== RWX 内存隐藏 =====
          find subprojects/frida-gum -name gummemory.c -exec \
            sed -i 's/PROT_READ | PROT_WRITE | PROT_EXEC/PROT_READ | PROT_WRITE/g' {} \;

          # ===== 可选：隐藏 agent/helper =====
          find subprojects/frida-core -name "*.c" -exec sed -i 's/frida-agent/myagent/g' {} \;
          find subprojects/frida-core -name "*.c" -exec sed -i 's/frida-helper/myhelper/g' {} \;

      # ✅ 编译（真正可用）
      - name: Build Frida Server (Android ARM64)
        run: |
          cd frida

          export ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT
          export PATH=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH

          python3 build.py build \
            --configuration release \
            --host=android-arm64

      # ✅ 输出确认
      - name: List build output
        run: |
          ls -lh frida/build/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: strongr-frida-server-android-arm64
          path: frida/build/*

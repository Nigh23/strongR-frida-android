name: Build Frida Hidden

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git python3 python3-pip ninja-build meson build-essential
          pip3 install --upgrade pip

      - name: Clone frida
        run: |
          git clone --recursive https://github.com/frida/frida.git
          cd frida
          git checkout 16.5.6
          git submodule update --init --recursive

      - name: Patch source
        run: |
          cd frida

          sed -i 's/gmain/sysmain/g' subprojects/frida-gum/gum/gum-main.c
          sed -i 's/gdbus/sysbus/g' subprojects/frida-gum/gum/gum-main.c
          sed -i 's/gum-js-loop/worker/g' subprojects/frida-gum/gum/gum-main.c

          sed -i 's/frida-server/mt/g' subprojects/frida-core/server/server.c

          sed -i 's/27042/52222/g' subprojects/frida-core/server/server.c
          sed -i 's/27043/52223/g' subprojects/frida-core/server/server.c

          sed -i 's#/re/frida/#/re/myapp/#g' subprojects/frida-core/pipe/pipe.c

      - name: Build
        run: |
          cd frida
          make core-android-arm64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-server
          path: frida/build/frida-android-arm64/bin/frida-server

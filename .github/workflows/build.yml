name: frida-arm64-终极隐藏版

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK r25b
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build gcc-multilib flex bison ruby ruby-dev
          sudo gem install fpm -v 1.11.0
          python3 -m pip install lief graphlib

      - name: Clone Frida 16.5.6
        run: |
          git clone --recurse-submodules --branch 16.5.6 https://github.com/frida/frida

      # ========================
      # 终极修复版·二次魔改（彻底跳过测试目录，零报错）
      # ========================
      - name: 二次魔改-深度去特征
        run: |
          cd frida
          CORE_DIRS="subprojects/frida-core subprojects/frida-gum"

          # 1. 修改默认端口 27042 → 51234
          grep -rl "27042" $CORE_DIRS | xargs -r sed -i 's/27042/51234/g'

          # 2. 仅处理核心源码，跳过所有测试/构建目录（彻底解决sed报错）
          find $CORE_DIRS \
            -path '*/test' -prune -o \
            -path '*/cases' -prune -o \
            -path '*/releng' -prune -o \
            -type f \( -name "*.c" -o -name "*.h" \) | xargs -r sed -i \
            -e 's/frida-server/sys_service/g' \
            -e 's/"frida"/"android_sys"/g' \
            -e 's/frida_/sys_/g' \
            -e 's/gum-/sys_core-/g' \
            -e 's/gum_/sys_core_/g'

          find $CORE_DIRS \
            -path '*/test' -prune -o \
            -path '*/cases' -prune -o \
            -path '*/releng' -prune -o \
            -name "*.c" | xargs -r sed -i \
            -e 's/"gum-js-loop"/"sys_worker"/g' \
            -e 's/"frida-thread"/"core_thread"/g' \
            -e 's/"gmain"/"system_main"/g'

          find $CORE_DIRS \
            -path '*/test' -prune -o \
            -path '*/cases' -prune -o \
            -path '*/releng' -prune -o \
            -name "*.c" | xargs -r sed -i \
            -e 's/"frida-agent"/"libandroid_kit"/g' \
            -e 's/"frida-jit"/"libsystem_jit"/g'

      - name: Build arm64
        run: |
          export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
          mkdir build-android-arm64
          cd build-android-arm64
          ../frida/configure --host=android-arm64
          make -j$(nproc)
          cd ..
          gzip build-android-arm64/subprojects/frida-core/server/frida-server

      - name: Upload to artifact
        uses: actions/upload-artifact@v4
        with:
          name: frida-arm64-终极隐藏版
          path: build-android-arm64/subprojects/frida-core/server/frida-server.gz

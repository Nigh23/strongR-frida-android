name: frida-arm64-彻底过检版
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-multilib flex bison ruby-dev
          sudo gem install fpm -v 1.11.0
          python3 -m pip install lief graphlib
      - name: Clone Frida 16.5.6
        run: |
          git clone --recurse-submodules --branch 16.5.6 https://github.com/frida/frida
      - name: 终极去特征（干掉gmain/gdbus+全隐藏）
        run: |
          cd frida
          for f in $(grep -rl "27042\|frida\|gum\|gmain\|gdbus" \
            subprojects/frida-core subprojects/frida-gum --include="*.c" --include="*.h"); do
            sed -i 's/27042/52222/g' "$f"
            sed -i 's/frida-server/mt/g' "$f"
            sed -i 's/"frida"/"sys"/g' "$f"
            sed -i 's/frida_/sys_/g' "$f"
            sed -i 's/gum-/sys-/g' "$f"
            sed -i 's/gum_/sys_/g' "$f"
            sed -i 's/"gum-js-loop"/"pool"/g' "$f"
            sed -i 's/"frida-thread"/"worker"/g' "$f"
            sed -i 's/"gmain"/"system"/g' "$f"      # 关键
            sed -i 's/"gdbus"/"service"/g' "$f"     # 关键
            sed -i 's/"frida-agent"/"libsystem"/g' "$f"
          done
          # 隐藏 RWX 内存特征
          for f in $(find subprojects/frida-gum -name "gummemory.c"); do
            sed -i 's/PROT_EXEC | PROT_WRITE/PROT_WRITE/g' "$f"
          done
      - name: Build arm64
        run: |
          export ANDROID_NDK_ROOT=$ANDROID_NDK_PATH
          mkdir build && cd build
          ../frida/configure --host=aarch64-linux-android
          make -j$(nproc)
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-arm64-final
          path: build/subprojects/frida-core/server/frida-server

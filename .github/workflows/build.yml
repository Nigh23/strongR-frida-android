name: frida-arm64-极简过检版
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: 安装基础工具
        run: sudo apt update && sudo apt install -y build-essential gcc-multilib
      - name: 克隆Frida 16.5.6
        run: git clone --depth 1 -b 16.5.6 https://github.com/frida/frida
      - name: 关键隐藏修改（无任何sed报错）
        run: |
          cd frida
          # 只改核心文件，绝不碰测试/构建目录
          FILES=(
            subprojects/frida-gum/gum/gum-main.c
            subprojects/frida-gum/gum/gum-thread.c
            subprojects/frida-core/server/server.c
            subprojects/frida-core/pipe/pipe.c
          )
          for f in "${FILES[@]}"; do
            [ -f "$f" ] || continue
            sed -i 's/27042/52222/g' "$f"
            sed -i 's/"gum-js-loop"/"pool"/g' "$f"
            sed -i 's/"gmain"/"system"/g' "$f"
            sed -i 's/"gdbus"/"service"/g' "$f"
            sed -i 's/frida-server/mt/g' "$f"
          done
          # 隐藏RWX内存
          find subprojects/frida-gum -name gummemory.c -exec sed -i 's/PROT_EXEC|PROT_WRITE/PROT_WRITE/g' {} \;
      - name: 编译arm64
        run: |
          cd frida
          ./configure --host=aarch64-linux-android
          make -j4
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: frida-arm64-final
          path: frida/build/frida-server-*-android-arm64

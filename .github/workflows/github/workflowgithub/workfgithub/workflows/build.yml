name: StrongR-Frida-16.5.6-ARM64
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android-arm64:
    runs-on: ubuntu-22.04
    steps:
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git python3 python3-pip \
            build-essential ninja-build meson \
            clang lld llvm unzip curl wget \
            pkg-config libglib2.0-dev \
            binutils-multiarch xxd

      - name: Setup Android NDK r25c
        run: |
          echo "[*] Downloading Android NDK r25c..."
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_ROOT=$PWD/android-ndk-r25c" >> $GITHUB_ENV
          echo "[+] NDK r25c installed successfully"

      - name: Clone Frida 16.5.6 Source Code
        run: |
          echo "[*] Cloning Frida 16.5.6 source..."
          git clone --depth 1 --recursive -b 16.5.6 https://github.com/frida/frida.git
          cd frida
          git submodule update --init --recursive --depth 1
          echo "[+] Frida 16.5.6 source cloned successfully"

      - name: Layer 1: Source Code Full Patch (Hide All Frida/Gum Traces)
        run: |
          cd frida
          
          # Create strict sed patch rules
          cat > /tmp/patch_rules.sed << 'EOF'
# Thread name obfuscation
s/"gum-js-loop"/"system-work"/g
s/"gum-js-thread"/"system-job"/g
s/"gmain"/"core-main"/g
s/"gdbus"/"core-bus"/g

# Process name obfuscation
s/"frida-server"/"system"/g
s/"frida-agent"/"core-agent"/g
s/"frida-helper"/"core-helper"/g
s/"frida-gadget"/"core-gadget"/g

# D-Bus service name obfuscation
s/"re\.frida\.server"/"core.system.service"/g
s/"re\.frida"/"core.system"/g
s/"org\.freedesktop\.DBus"/"org.core.bus"/g

# Function name obfuscation
s/frida_/core_/g
s/gum_/base_/g

# Type/Class name obfuscation
s/Frida/CoreService/g
s/Gum/BaseCore/g
s/frida/corelib/g
s/gum/basecore/g

# Macro definition obfuscation
s/FRIDA_/CORE_/g
s/GUM_/BASE_/g

# Port modification (default 27042 -> 44765)
s/27042/44765/g
s/27043/44766/g

# Version number modification
s/"16\.5\.6"/"16.6.5"/g
s/16\.5\.6/16.6.5/g
EOF
          
          # Batch apply patch to all source files
          echo "[*] Applying source code patch..."
          find . -type f \( \
            -name "*.c" -o -name "*.h" -o -name "*.vala" \
            -o -name "meson.build" -o -name "*.xml" -o -name "*.pc.in" \
          \) | xargs sed -i -f /tmp/patch_rules.sed
          echo "[+] Source code patch completed"

      - name: Layer 2: Compile Frida Server for Android ARM64
        run: |
          cd frida
          
          # Set up build environment
          export ANDROID_NDK_ROOT=${ANDROID_NDK_ROOT}
          export PATH=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          export CC=aarch64-linux-android21-clang
          export CXX=aarch64-linux-android21-clang++
          
          # Configure Meson build
          echo "[*] Configuring Meson build system..."
          meson setup build \
            --cross-file subprojects/frida-core/releng/meson/android-arm64.txt \
            --buildtype=release \
            -Ddefault_library=shared \
            -Denable_glib_support=true \
            -Denable_tests=false \
            -Denable_docs=false
          
          # Start compilation
          echo "[*] Compiling Frida Server (this will take 10-20 minutes)..."
          ninja -C build frida-server
          echo "[+] Compilation completed successfully"

      - name: Layer 3: Binary Optimization & Final Obfuscation
        run: |
          cd frida
          
          # Locate compiled frida-server binary
          FRIDA_SERVER=$(find build -name "frida-server" -type f | head -n 1)
          if [ ! -f "$FRIDA_SERVER" ]; then
            echo "❌ Error: frida-server binary not found!"
            exit 1
          fi
          echo "[+] Found compiled binary at: $FRIDA_SERVER"
          
          # Backup original binary
          cp "$FRIDA_SERVER" "$FRIDA_SERVER.backup"
          
          # Strip all symbols (critical for anti-detection)
          echo "[*] Stripping all symbols from binary..."
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-strip --strip-all "$FRIDA_SERVER"
          echo "[+] Symbol stripping completed"
          
          # Binary-level string replacement for residual traces
          echo "[*] Applying binary-level obfuscation..."
          python3 << 'PYTHON_SCRIPT'
import os
import sys

# Get binary path from environment variable
server_path = os.environ.get('FRIDA_SERVER')
if not server_path or not os.path.exists(server_path):
    print("❌ Error: Binary path invalid or file not found!")
    sys.exit(1)

# Read binary data
with open(server_path, 'rb') as f:
    binary_data = bytearray(f.read())

# Define replacement rules (strict length matching)
replacements = [
    (b'frida', b'corelib'),
    (b'Frida', b'CoreLib'),
    (b'FRIDA', b'CORE'),
    (b'gum', b'basecore'),
    (b'Gum', b'BaseCore'),
    (b'GUM', b'BASE'),
    (b're.frida', b'core.system'),
    (b'freedesktop.DBus', b'core.bus'),
]

# Apply replacements
total_replaced = 0
for old_str, new_str in replacements:
    count = binary_data.count(old_str)
    if count > 0:
        binary_data = binary_data.replace(old_str, new_str)
        total_replaced += count

# Write modified binary back
with open(server_path, 'wb') as f:
    f.write(binary_data)

print(f"[+] Binary obfuscation completed, total {total_replaced} strings replaced")
PYTHON_SCRIPT

      - name: Layer 4: Package & Verify Build Artifacts
        run: |
          cd frida
          
          # Create output directory
          mkdir -p artifacts
          
          # Locate final binary
          FRIDA_SERVER=$(find build -name "frida-server" -type f | head -n 1)
          FRIDA_SERVER_BACKUP=$(find build -name "frida-server.backup" -type f | head -n 1)
          
          # Copy files to output
          cp "$FRIDA_SERVER" artifacts/frida-server-strongr-16.5.6-arm64
          cp "$FRIDA_SERVER_BACKUP" artifacts/frida-server-original-16.5.6-arm64
          
          # Generate build info
          cat > artifacts/BUILD_INFO.md << 'BUILD_INFO'
# StrongR-Frida 16.5.6 ARM64 Build Report
## Base Information
- Source Version: Frida 16.5.6
- Modified Version: 16.6.5
- Target Platform: Android ARM64 (aarch64)
- Build Mode: Release (Optimized)
- NDK Version: r25c

## Obfuscation Features
✅ Thread Name: gum-js-loop → system-work
✅ Process Name: frida-server → system
✅ Function Name: frida_* → core_*, gum_* → base_*
✅ Symbol Table: Fully Stripped
✅ Port: 27042 → 44765
✅ D-Bus Service: re.frida → core.system
✅ All frida/gum strings replaced

## Usage Instructions
### 1. Push to Android Device
```bash
adb push frida-server-strongr-16.5.6-arm64 /data/local/tmp/

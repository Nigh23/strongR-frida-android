name: strongR-frida

on:
  workflow_dispatch:  # 手动触发编译
  schedule:
    - cron: "0 9 */3 * *"  # 可选：每3天自动编译一次，不需要可以删掉

jobs:
  android_build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android NDK r25b
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential tree ninja-build \
            gcc-multilib g++-multilib lib32stdc++-9-dev \
            flex bison ruby ruby-dev \
            python3-requests python3-setuptools python3-pip \
            libc6-dev libc6-dev-i386
          sudo gem install fpm -v 1.11.0 --no-document
          python3 -m pip install lief graphlib

      - name: Git config
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      # 克隆 strongR-frida 补丁仓库（改成公开可用地址）
      - name: Clone strongR-frida patches
        run: |
          git clone https://github.com/strongR-frida/strongR-frida.git Patchs

      # 克隆指定版本 Frida 并打补丁
      - name: Clone Frida 16.5.6 and apply patches
        run: |
          git clone --recurse-submodules --branch 16.5.6 https://github.com/frida/frida
          cd frida
          for mod in ../Patchs/*; do
            if [ -d "$mod" ] && [ -d "subprojects/$(basename $mod)" ]; then
              name=$(basename $mod)
              echo "Apply patches to $name"
              cd subprojects/$name
              git am --3way ../../$mod/*.patch || echo "Patch may have conflicts, continue"
              cd ../..
            fi
          done
          cd ..

      # 编译全架构
      - name: Build frida-server for Android
        shell: bash
        run: |
          export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
          ARCHES="android-arm android-arm64 android-x86 android-x86_64"
          for ARCH in $ARCHES; do
            mkdir -p build-$ARCH
            cd build-$ARCH
            ../frida/configure --host=$ARCH
            make -j$(nproc)
            cd ..
          done

      # 压缩产物
      - name: Gzip binaries
        run: |
          for arch in arm arm64 x86 x86_64; do
            gzip -f build-android-$arch/subprojects/frida-core/server/frida-server
            gzip -f build-android-$arch/subprojects/frida-core/inject/frida-inject
            gzip -f build-android-$arch/subprojects/frida-core/lib/gadget/frida-gadget.so
          done

      # 获取时间戳用于版本号
      - name: Get build time
        id: time
        run: echo "BUILD_TIME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

      # 创建 Release
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: strongR-frida-16.5.6-${{ env.BUILD_TIME }}
          name: strongR-frida 16.5.6 ${{ env.BUILD_TIME }}
          draft: false
          prerelease: false

      # 上传 frida-server
      - name: Upload arm
        uses: softprops/action-gh-release@v1
        with:
          files: build-android-arm/subprojects/frida-core/server/frida-server.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload arm64
        uses: softprops/action-gh-release@v1
        with:
          files: build-android-arm64/subprojects/frida-core/server/frida-server.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload x86
        uses: softprops/action-gh-release@v1
        with:
          files: build-android-x86/subprojects/frida-core/server/frida-server.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload x86_64
        uses: softprops/action-gh-release@v1
        with:
          files: build-android-x86_64/subprojects/frida-core/server/frida-server.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 上传 frida-inject
      - name: Upload inject arm
        uses: softprops/action-gh-release@v1
        with:
          files: build-android-arm/subprojects/frida-core/inject/frida-inject.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload inject arm64
        uses: softprops/action-gh-release@v1
        with:
          files: build-android-arm64/subprojects/frida-core/inject/frida-inject.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 上传 gadget
      - name: Upload gadget arm
        uses: softprops/action-gh-release@v1
        with:
          files: build-android-arm/subprojects/frida-core/lib/gadget/frida-gadget.so.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload gadget arm64
        uses: softprops/action-gh-release@v1
        with:
          files: build-android-arm64/subprojects/frida-core/lib/gadget/frida-gadget.so.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

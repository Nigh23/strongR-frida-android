name: frida-arm64-彻底过检版
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc-multilib clang lib32stdc++6 git curl flex bison

      - name: 克隆Frida 16.5.6
        run: |
          git clone --depth 1 --branch 16.5.6 https://github.com/frida/frida.git
          cd frida
          git submodule update --init --recursive --depth 1

      - name: 终极去特征（干掉gmain/gdbus+隐藏RWX）
        run: |
          cd frida
          DIRS="subprojects/frida-core/src subprojects/frida-gum"
          FILES=$(find $DIRS -type f \( -name "*.c" -o -name "*.h" \) | xargs grep -l "27042\|frida\|gum\|gmain\|gdbus" 2>/dev/null)

          for f in $FILES; do
            sed -i 's/27042/52222/g' "$f"
            sed -i 's/frida-server/mt/g' "$f"
            sed -i 's/"frida"/"sys"/g' "$f"
            sed -i 's/frida_/sys_/g' "$f"
            sed -i 's/gum-/sys-/g' "$f"
            sed -i 's/gum_/sys_/g' "$f"
            sed -i 's/"gum-js-loop"/"pool"/g' "$f"
            sed -i 's/"frida-thread"/"worker"/g' "$f"
            sed -i 's/"gmain"/"system"/g' "$f"
            sed -i 's/"gdbus"/"service"/g' "$f"
            sed -i 's/"frida-agent"/"libsystem"/g' "$f"
          done

          # 隐藏RWX内存特征
          find subprojects/frida-gum -name "gummemory.c" -exec sed -i 's/PROT_EXEC | PROT_WRITE/PROT_WRITE/g' {} \;

      - name: 编译arm64版本
        run: |
          cd frida
          ./configure --host=aarch64-linux-android
          make -j$(nproc)

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: frida-arm64-彻底过检版
          path: frida/build/frida-server-16.5.6-android-arm64

name: Build Full Custom Frida

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git python3 python3-pip ninja-build meson build-essential curl unzip
          pip3 install --upgrade pip setuptools wheel

      - name: Clone Frida
        run: |
          git clone --recursive -b 16.5.6 https://github.com/frida/frida.git
          cd frida
          git submodule update --init --recursive

      # 🔥 核心：同步修改协议（安全版本）
      - name: Patch ALL (client + server)
        run: |
          cd frida

          echo "==== 修改协议（长度一致） ===="

          find . -type f | while read f; do
            sed -i 's/frida:rpc/myida:rpc/g' "$f" || true
            sed -i 's/re\.frida/re.myida/g' "$f" || true
          done

          echo "==== 修改线程特征 ===="

          find . -type f | while read f; do
            sed -i 's/gmain/sysmn/g' "$f" || true
            sed -i 's/gdbus/sysbs/g' "$f" || true
            sed -i 's/gum-js-loop/worker/g' "$f" || true
          done

      - name: Setup Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_ROOT=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      # ✅ 编译 server
      - name: Build frida-server
        run: |
          cd frida
          export PATH=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH

          python3 releng/build.py \
            --host=android-arm64 \
            --enable-server \
            build

      # ✅ 编译 python binding（关键）
      - name: Build frida-python
        run: |
          cd frida/subprojects/frida-python
          python3 setup.py build

      # ✅ 编译 tools（client）
      - name: Build frida-tools
        run: |
          cd frida/subprojects/frida-tools
          pip3 install .

      # 📦 输出
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: custom-frida-full
          path: |
            frida/build/**/*
            frida/subprojects/frida-python/build/**/*

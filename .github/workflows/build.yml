name: Build StrongR-Frida
on: [push, pull_request]

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 python3-pip ninja-build meson llvm lld
          pip3 install --upgrade pip setuptools wheel
          
      - name: Clone Frida with Submodules
        run: |
          git clone --depth 1 --recursive -b 16.5.6 https://github.com/frida/frida.git
          cd frida
          git submodule update --init --recursive --depth 1  # 关键：拉子模块
          
      - name: Apply StrongR Patches
        run: |
          cd frida
          # 只改核心文件，避免踩坑
          FILES=(
            subprojects/frida-gum/gum/gum-main.c
            subprojects/frida-gum/gum/gum-thread.c
            subprojects/frida-core/server/server.c
            subprojects/frida-core/pipe/pipe.c
          )
          for f in "${FILES[@]}"; do
            [ -f "$f" ] || continue
            sed -i 's/27042/52222/g' "$f"
            sed -i 's/"gum-js-loop"/"pool"/g' "$f"
            sed -i 's/"gmain"/"system"/g' "$f"
            sed -i 's/"gdbus"/"service"/g' "$f"
            sed -i 's/frida-server/mt/g' "$f"
          done
          # 隐藏 RWX 内存
          find subprojects/frida-gum -name gummemory.c -exec sed -i 's/PROT_EXEC|PROT_WRITE/PROT_WRITE/g' {} \;
          
      - name: Build Frida Server
        run: |
          cd frida
          # 设置 Android 交叉编译环境
          export FRIDA_HOST=android
          export FRIDA_ARCHS=arm64
          export CC=clang
          export CXX=clang++
          export CFLAGS="-fPIC"
          export CXXFLAGS="-fPIC"
          # 编译
          python3 build.py build --configuration release --target android-arm64
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: strongr-frida-server-android-arm64
          path: frida/build/frida-server-android-arm64

name: strongR-arm64-release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK r25b
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build gcc-multilib flex bison ruby ruby-dev
          sudo gem install fpm -v 1.11.0 --no-document
          python3 -m pip install lief graphlib

      - name: Clone patch & frida 16.5.6
        run: |
          git clone https://github.com/strongR-frida/strongR-frida.git Patchs
          git clone --recurse-submodules --branch 16.5.6 https://github.com/frida/frida
          cd frida
          for mod in ../Patchs/*; do
            name=$(basename $mod)
            [ -d "subprojects/$name" ] || continue
            cd subprojects/$name
            git am --3way ../../$mod/*.patch || true
            cd ../..
          done

      - name: Build arm64
        run: |
          export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
          mkdir build-android-arm64
          cd build-android-arm64
          ../frida/configure --host=android-arm64
          make -j$(nproc)
          cd ..
          gzip build-android-arm64/subprojects/frida-core/server/frida-server

      - name: Create tag & release
        run: echo "TAG=strongR-16.5.6-arm64-$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.TAG }}
          name: strongR-frida-arm64
          files: build-android-arm64/subprojects/frida-core/server/frida-server.gz

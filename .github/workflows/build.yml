name: StrongR-Frida-Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git python3 python3-pip build-essential ninja-build meson clang lld llvm unzip curl wget pkg-config libglib2.0-dev binutils-multiarch xxd

      - name: Setup Android NDK r25c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_ROOT=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Clone Frida 16.5.6
        run: |
          git clone --depth 1 --recursive -b 16.5.6 https://github.com/frida/frida
          cd frida
          git submodule update --init --recursive --depth 1

      - name: Full Source Patch (Hide All Frida/Gum)
        run: |
          cd frida
          cat > /tmp/rules.sed << 'EOF'
s/"gum-js-loop"/"sys-loop"/g
s/"gum-js-thread"/"sys-thread"/g
s/"gmain"/"sys-main"/g
s/"gdbus"/"sys-bus"/g
s/"frida-server"/"mtk_service"/g
s/"frida-agent"/"sys_agent"/g
s/"frida-gadget"/"sys_gadget"/g
s/"frida-inject"/"sys_inject"/g
s/re\.frida/server\.sys/g
s/frida_/sys_/g
s/Frida/SysService/g
s/frida/syscore/g
s/gum_/ui_/g
s/Gum/UiCore/g
s/gum/uicore/g
s/FRIDA_/SYS_/g
s/GUM_/UI_/g
s/27042/51777/g
s/16\.5\.6/16.7.8/g
EOF
          find . -name "*.[ch]" -o -name "*.vala" -o -name "meson.build" | xargs sed -i -f /tmp/rules.sed

      - name: Build Frida Server ARM64
        run: |
          cd frida
          export PATH=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          meson setup build --cross-file subprojects/frida-core/releng/meson/android-arm64.txt --buildtype=release -Denable_tests=false -Denable_docs=false
          ninja -C build frida-server

      - name: Binary Hide & Strip
        run: |
          cd frida
          SERVER=$(find build -name frida-server -type f | head -1)
          cp $SERVER $SERVER.bak
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-strip --strip-all $SERVER
          python3 -c "
with open('$SERVER','rb') as f: d=f.read()
d = d.replace(b'frida',b'syscore').replace(b'Frida',b'SysCore')
d = d.replace(b'gum',b'uicore').replace(b'Gum',b'UICore')
with open('$SERVER','wb') as f: f.write(d)
"

      - name: Package Output
        run: |
          cd frida
          mkdir -p output
          SERVER=$(find build -name frida-server -type f | head -1)
          cp $SERVER output/strongr-frida-server
          chmod 777 output/strongr-frida-server
          echo "StrongR Frida 16.5.6 Hidden Build Done" > output/info.txt

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: StrongR-Frida-ARM64
          path: frida/output/
